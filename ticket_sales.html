<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vente de tickets de match</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #2c3e50;
            border-bottom: 2px solid #eceff1;
            padding-bottom: 12px;
            font-size: 22px;
            font-weight: 600;
        }

        .fieldset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .fieldset-grid {
                grid-template-columns: 1fr;
            }
        }

        fieldset {
            border: 1px solid #cfd8dc;
            border-radius: 8px;
            padding: 20px;
            background-color: #fafafa;
            margin: 0;
        }

        legend {
            font-weight: bold;
            color: #007bff;
            padding: 0 10px;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label {
            margin-bottom: 6px;
            color: #546e7a;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            font-size: 15px;
            background-color: #ffffff;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
            outline: none;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            margin: 0;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .radio-item label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 500;
            color: #37474f;
        }

        input[type="button"] {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        input[type="button"]:hover {
            background-color: #218838;
        }

        .table-responsive {
            overflow-x: auto;
            width: 100%;
            border: 1px solid #eceff1;
            border-radius: 6px;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background-color: #fff;
        }

        th {
            background-color: #f8f9fa;
            color: #546e7a;
            padding: 14px 16px;
            font-weight: 600;
            border-bottom: 2px solid #eceff1;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #eceff1;
            color: #37474f;
            font-size: 14px;
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f9fbfd;
        }

        .badge-cin {
            font-family: monospace;
            font-weight: bold;
            color: #1a73e8;
            background-color: #e8f0fe;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .badge-category {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
        }

        .cat-1 {
            background-color: #e3f2fd;
            color: #0d47a1;
        }

        .cat-2 {
            background-color: #f3e5f5;
            color: #4a148c;
        }

        .price-text {
            font-weight: bold;
            color: #2e7d32;
        }
    </style>
    <script>
        let matchs = [];
        let tickets = [];
        async function chargerMatchs() {
            try {
                const response = await fetch("matchs.json");
                matchs = await response.json();
                remplirListeMatchs();
            } catch (error) {
                console.error("Erreur lors du chargement des matchs : ", error);
            }
        }
        function remplirListeMatchs() {
            const matchSelect = document.getElementById("matchSelect");
            matchSelect.innerText = "";
            matchs.forEach((elt) => {
                const option = document.createElement("option");
                option.value = elt.codematch;
                let datematch = new Date(elt.datematch);
                let date = datematch.toLocaleDateString('fr-FR');
                let time = datematch.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                option.innerText = `${elt.equipe1} vs ${elt.equipe2} - ${date} ${time}`;
                matchSelect.appendChild(option);
            })
        }
        function existTicket(cin_pass, codematch) {
            const cin = document.getElementById("cin_pass").value;
            const matchSelected = document.getElementById("matchSelect").value;
            if (cin_pass === cin && codematch === matchSelected) {
                alert("Ticket déjà acheté pour ce match");
                return true;
            } else {
                return false;
            }
        }
        function valider() {
            const inputFields = document.querySelectorAll("input");
            const selectFields = document.querySelectorAll("select");
            const allFields = [...inputFields, ...selectFields];
            for (const elt of allFields) {
                if (elt.value.trim() === "") {
                    alert("Veuillez remplir tout les champs !");
                    return false;
                }
            }
            const country = document.getElementById("pays").value;
            const cin_pass = document.getElementById("cin_pass").value;
            if (country === "Maroc") {
                const pattern = /^[A-Z]{1,2}\d{5,6}$/;
                if (!pattern.test(cin_pass)) {
                    alert("Numéro de CIN/Passeport invalide !");
                    return false;
                }
            }
            for (const elt of tickets) {
                if (existTicket(elt.cin_pass, elt.codematch)) {
                    return false;
                }
            }
            return true;
        }
        function afficherTickets() {
            const tbody = document.querySelector("#ticketTable tbody");
            tbody.textContent = "";

            tickets.forEach((elt) => {
                const row = document.createElement("tr");

                const nom_prenom = `${elt.nom} ${elt.prenom}`;
                const datematch = new Date(elt.datematch);
                const dateStr = `${datematch.toLocaleDateString('fr-FR')} ${datematch.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;
                const prixStr = `${elt.prix} DH`;

                // Création des cellules ordonnées
                const cellsData = [
                    { value: elt.cin_pass, isCin: true },
                    { value: nom_prenom },
                    { value: elt.pays },
                    { value: elt.codematch },
                    { value: dateStr },
                    { value: `Catégorie ${elt.categorie}`, isCategory: true, catNum: elt.categorie },
                    { value: prixStr, isPrice: true }
                ];

                cellsData.forEach((cellInfo) => {
                    const cell = document.createElement("td");

                    // Injection de styles spécifiques ou de badges selon la cellule
                    if (cellInfo.isCin) {
                        cell.innerHTML = `<span class="badge-cin">${cellInfo.value}</span>`;
                    } else if (cellInfo.isCategory) {
                        const catClass = cellInfo.catNum == 1 ? 'cat-1' : 'cat-2';
                        cell.innerHTML = `<span class="badge-category ${catClass}">${cellInfo.value}</span>`;
                    } else if (cellInfo.isPrice) {
                        cell.innerHTML = `<span class="price-text">${cellInfo.value}</span>`;
                    } else {
                        cell.innerText = cellInfo.value;
                    }

                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });
        }
        function ajouterTicket() {
            if (!valider()) return;
            const codematch = document.getElementById("matchSelect").value;
            const cin_pass = document.getElementById("cin_pass").value;
            const nom = document.getElementById("nom").value;
            const prenom = document.getElementById("prenom").value;
            const pays = document.getElementById("pays").value;
            const categorie = document.querySelector('input[name="categorie"]:checked').value;
            let datematch = "";
            let prix = 0;
            matchs.forEach((elt) => {
                if (elt.codematch === codematch) {
                    datematch = elt.datematch;
                    prix = elt.prix;
                }
            })
            if (categorie == "1") {
                prix *= 2;
            }
            const ticket = { cin_pass, nom, prenom, pays, codematch, datematch, categorie, prix };
            tickets.push(ticket);
            afficherTickets();
            imprimerTicket(ticket);
        }
        function imprimerTicket(ticket) {
            let datematch = new Date(ticket.datematch);
            let date = datematch.toLocaleDateString('fr-FR');
            let time = datematch.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const nouvelleFenetre = window.open("", "_blank", "width=600,height=400");
            const contenuHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Impression Ticket</title>
                    <style>
                        body {
                            font-family: Arial, sans-serif;
                            display: flex;
                            justify-content: center;
                            padding: 20px;
                        }
                        .ticket-container {
                            border: 2px dashed #1e73be;
                            border-radius: 10px;
                            padding: 25px;
                            width: 450px;
                            box-sizing: border-box;
                        }
                        .ticket-title {
                            color: #1e73be;
                            font-size: 20px;
                            font-weight: bold;
                            margin-bottom: 20px;
                            display: flex;
                            align-items: center;
                            gap: 10px;
                        }
                        .ticket-row {
                            display: flex;
                            margin-bottom: 10px;
                            font-size: 15px;
                        }
                        .label {
                            font-weight: bold;
                            width: 120px;
                        }
                        .value {
                            color: #333;
                        }
                        .footer {
                            text-align: center;
                            margin-top: 25px;
                            font-size: 14px;
                        }
                    </style>
                </head>
                <body>
                    <div class="ticket-container">
                        <div class="ticket-title">
                            🎟️ Ticket Coupe d'Afrique 2025
                        </div>
                        
                        <div class="ticket-row">
                            <span class="label">Supporter :</span>
                            <span class="value">${ticket.nom} ${ticket.prenom}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="label">Pays :</span>
                            <span class="value">${ticket.pays}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="label">Match :</span>
                            <span class="value">${ticket.codematch}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="label">Date :</span>
                            <span class="value">${date} ${time}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="label">Catégorie :</span>
                            <span class="value">${ticket.categorie}</span>
                        </div>
                        <div class="ticket-row">
                            <span class="label">Prix :</span>
                            <span class="value">${ticket.prix} MAD</span>
                        </div>
                        
                        <div class="footer">
                            Merci et bon match ! ⚽
                        </div>
                    </div>

                    <script>
                        window.onload = function() {
                            window.print();
                        };
                    <\/script>
                </body>
                </html>
            `;
            nouvelleFenetre.document.write(contenuHTML);
            nouvelleFenetre.document.close();
        }
        window.addEventListener("DOMContentLoaded", () => {
            chargerMatchs();
            const validateButton = document.getElementById("btVendre");
            validateButton.addEventListener("click", ajouterTicket);
        })
    </script>
</head>

<body>
    <div class="container">
        <h2>Formulaire Vente de ticket</h2>

        <form action="">
            <div class="fieldset-grid">

                <!-- Bloc Supporter -->
                <fieldset>
                    <legend>Informations du Supporter</legend>

                    <div class="form-group">
                        <label for="pays">Pays d'origine :</label>
                        <select id="pays">
                            <option value="Maroc">Maroc</option>
                            <option value="Mali">Mali</option>
                            <option value="Congo">Congo</option>
                            <option value="Benin">Benin</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cin_pass">CIN / Passeport :</label>
                        <input type="text" id="cin_pass" placeholder="Ex: AB123456">
                    </div>

                    <div class="form-group">
                        <label for="nom">Nom :</label>
                        <input type="text" id="nom">
                    </div>

                    <div class="form-group">
                        <label for="prenom">Prénom :</label>
                        <input type="text" id="prenom">
                    </div>
                </fieldset>

                <!-- Bloc Match et Validation -->
                <fieldset>
                    <legend>Match et Catégorie</legend>

                    <div class="form-group">
                        <label for="matchSelect">Sélection du match :</label>
                        <select id="matchSelect">
                            <option value="">-- Choisir un match --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Catégorie du ticket :</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="categorie1" name="categorie" value="1" checked>
                                <label for="categorie1">Catégorie 1</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="categorie2" name="categorie" value="2">
                                <label for="categorie2">Catégorie 2</label>
                            </div>
                        </div>
                    </div>

                    <input type="button" value="Vendre ticket" id="btVendre">
                </fieldset>

            </div>
        </form>
    </div>

    <!-- ZONE DE VISUALISATION DES DONNÉES -->
    <div class="container">
        <h2>Liste des Tickets</h2>

        <div class="table-responsive">
            <table id="ticketTable">
                <thead>
                    <tr>
                        <th>CIN/Passeport</th>
                        <th>Nom et Prénom</th>
                        <th>Pays</th>
                        <th>Code Match</th>
                        <th>Date Match</th>
                        <th>Catégorie</th>
                        <th>Prix</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</body>

</html>
